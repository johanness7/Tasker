<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tasker</title>
    <link rel="apple-touch-icon" href="logo.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #e6dfd3; 
            --card-bg: #f5f0e6;  
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd1c5;
            --btn-dark: #27272a;
            --btn-light: #e4e4e7;
            --danger: #9f1239;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .login-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-main);
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 28px;
            margin-bottom: 16px;
        }

        .login-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }

        .btn-login {
            flex: 1;
            width: 100%;
            border-radius: 18px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s ease;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login-child {
            background: var(--btn-light);
            color: var(--text-main);
        }

        .btn-login-parent {
            background: var(--btn-dark);
            color: #ffffff;
            border: none;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            background: var(--btn-dark);
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            padding: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input {
            padding: 16px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1.15rem;
            color: var(--text-main);
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus {
            border-color: var(--text-main);
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .role-indicator {
            font-size: 1.05rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 10px;
            background: var(--btn-light);
        }

        .balance-section {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-align: center;
            padding: 24px 0;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .balance-value {
            font-size: 3.4rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stats-section {
            display: flex;
            justify-content: space-between;
            background: var(--btn-light);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .task-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .task-card.waiting {
            background: #fffbeb;
            border-color: #fde68a;
        }

        .task-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 4px;
            color: var(--text-main);
            word-break: break-word;
        }

        .task-reward {
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 700;
            background: var(--btn-light);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .parent-btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-check {
            background: var(--btn-dark);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .btn-trash {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 1.2rem;
        }

        .btn-complete {
            background: var(--btn-dark);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .modal-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .modal-card h3 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .modal-card p {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-modal-confirm {
            background: var(--danger);
            color: white;
            border: none;
            padding: 16px;
            font-weight: 700;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .btn-modal-cancel {
            background: var(--btn-light);
            color: var(--text-main);
            border: none;
            padding: 16px;
            font-weight: 700;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div id="loginScreen" class="card login-card">
            <h1>Familien-Board</h1>
            <div class="login-box">
                <button class="btn-login btn-login-child" onclick="login('child')">
                    <span style="font-size: 3rem;">👦</span>
                    <span>Ich bin das Kind</span>
                </button>
                <button class="btn-login btn-login-parent" onclick="login('parent')">
                    <span style="font-size: 3rem;">👨‍👩‍👧‍👦</span>
                    <span>Ich bin Elternteil</span>
                </button>
            </div>
        </div>

        <div id="dashboard" class="card hidden">
            <div class="nav-header">
                <span id="roleDisplay" class="role-indicator"></span>
                <button class="btn-text" onclick="logout()">Abmelden</button>
            </div>

            <div class="balance-section">
                <div class="balance-label">Aktuelles Guthaben</div>
                <div class="balance-value"><span id="balanceAmount">0,00</span> €</div>
                
                <div id="parentResetContainer" class="hidden" style="margin-top: 14px;">
                    <button class="btn-text" style="color: var(--danger);" onclick="openResetModal()">Guthaben auszahlen</button>
                </div>
            </div>

            <div class="stats-section">
                <div class="stat-box">
                    <div class="stat-label">Heute erledigt</div>
                    <div class="stat-value" id="todayDone">0 Tasks</div>
                </div>
                <div class="stat-box" style="text-align: right;">
                    <div class="stat-label">Heute insgesamt</div>
                    <div class="stat-value" id="todayTotal">0 Tasks</div>
                </div>
            </div>

            <div id="parentArea" class="hidden" style="border-bottom: 1px solid var(--border-color); padding-bottom: 24px; margin-bottom: 16px;">
                <h2>Neue Aufgabe erstellen</h2>
                <div class="input-group">
                    <label for="taskTitle">Was steht an?</label>
                    <input type="text" id="taskTitle" placeholder="z.B. Staubsaugen">
                </div>
                <div class="input-group">
                    <label for="taskReward">Belohnung (€)</label>
                    <input type="number" id="taskReward" placeholder="z.B. 0.50" step="0.05" min="0">
                </div>
                <button class="btn-action" onclick="addTask()">Aufgabe abschicken</button>
            </div>

            <h2>Offene Aufgaben</h2>
            <div id="taskList" class="task-list"></div>
        </div>

    </div>

    <div id="resetModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon">⚠️</div>
            <h3>Guthaben zurücksetzen?</h3>
            <p>Möchtest du das aktuelle Guthaben wirklich auf 0,00 € setzen?</p>
            <div class="modal-buttons">
                <button class="btn-modal-confirm" onclick="confirmResetBalance()">Ja, löschen</button>
                <button class="btn-modal-cancel" onclick="closeResetModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyC5cyy8yAu8HSsNawVbvCd4i6QT3tDYdcY",
          authDomain: "tasker-95d59.firebaseapp.com",
          projectId: "tasker-95d59",
          storageBucket: "tasker-95d59.firebasestorage.app",
          messagingSenderId: "316824945444",
          appId: "1:316824945444:web:4ed14424a317e9c60f29b1",
          databaseURL: "https://tasker-95d59-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRole = null;
        let tasks = [];
        let balance = 0.00;
        let isFirstLoad = true; // Verhindert, dass alte Aufgaben beim Starten benachrichtigen

        window.addEventListener('DOMContentLoaded', () => {
            const savedRole = localStorage.getItem('fam_saved_role_v3');
            if (savedRole) {
                login(savedRole);
            }
        });

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // BENACHRICHTIGUNGS-ERLAUBNIS ANFORDERN
        function requestNotificationPermission() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        console.log("Benachrichtigungen erlaubt!");
                    }
                });
            }
        }

        // ECHTE PUSH-FUNKTION (Sendet Meldung ans Handy)
        function sendNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, {
                    body: body,
                    icon: 'logo.png'
                });
            }
        }

        function login(role) {
            currentRole = role;
            localStorage.setItem('fam_saved_role_v3', role);

            // Direkt nach Erlaubnis fragen, sobald eingeloggt
            requestNotificationPermission();

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            const roleDisplay = document.getElementById('roleDisplay');
            roleDisplay.textContent = role === 'parent' ? 'Elternteil' : 'Kind';
            roleDisplay.style.color = 'var(--text-main)';

            if (role === 'parent') {
                document.getElementById('parentArea').classList.remove('hidden');
                document.getElementById('parentResetContainer').classList.remove('hidden');
            } else {
                document.getElementById('parentArea').classList.add('hidden');
                document.getElementById('parentResetContainer').classList.add('hidden');
            }

            startCloudSync();
        }

        function logout() {
            currentRole = null;
            localStorage.removeItem('fam_saved_role_v3');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        function startCloudSync() {
            db.ref('balance').on('value', (snapshot) => {
                balance = snapshot.val() || 0.00;
                updateBalanceDisplay();
            });

            // CLOUD-LISTENER: Prüft live, ob neue Dinge passieren
            db.ref('tasks').on('value', (snapshot) => {
                const tasksObj = snapshot.val() || {};
                const newTasksList = Object.keys(tasksObj).map(key => ({
                    id: key,
                    ...tasksObj[key]
                }));

                // BENACHRICHTIGUNGS-LOGIK
                if (!isFirstLoad) {
                    // 1. Für das Kind: Kam eine neue Aufgabe hinzu?
                    if (currentRole === 'child' && newTasksList.length > tasks.length) {
                        const addedTask = newTasksList.find(nt => !tasks.some(ot => ot.id === nt.id));
                        if (addedTask && addedTask.status === 'open') {
                            sendNotification("Neue Aufgabe! 📋", `${addedTask.title} für ${addedTask.reward.toFixed(2).replace('.', ',')} €`);
                        }
                    }

                    // 2. Für die Eltern: Hat das Kind eine Aufgabe abgegeben?
                    if (currentRole === 'parent') {
                        newTasksList.forEach(nt => {
                            const oldTask = tasks.find(ot => ot.id === nt.id);
                            if (oldTask && oldTask.status === 'open' && nt.status === 'waiting') {
                                sendNotification("Aufgabe erledigt! ✔️", `Das Kind hat "${nt.title}" fertiggestellt.`);
                            }
                        });
                    }
                }

                tasks = newTasksList;
                isFirstLoad = false;
                renderTasks();
                updateStatsDisplay();
            });
        }

        function updateBalanceDisplay() {
            document.getElementById('balanceAmount').textContent = balance.toFixed(2).replace('.', ',');
        }

        function updateStatsDisplay() {
            const todayStr = getTodayString();
            const todayTasks = tasks.filter(task => task.date === todayStr);
            const totalToday = todayTasks.length;
            const doneToday = todayTasks.filter(task => task.status === 'done').length;

            document.getElementById('todayDone').textContent = `${doneToday} Tasks`;
            document.getElementById('todayTotal').textContent = `${totalToday} Tasks`;
        }

        function addTask() {
            const titleInput = document.getElementById('taskTitle');
            const rewardInput = document.getElementById('taskReward');

            if (!titleInput.value || !rewardInput.value) {
                alert('Bitte trag eine Aufgabe und den Betrag ein.');
                return;
            }

            const newTask = {
                title: titleInput.value,
                reward: parseFloat(rewardInput.value),
                status: 'open',
                date: getTodayString()
            };

            db.ref('tasks').push(newTask);

            titleInput.value = '';
            rewardInput.value = '';
            
            document.activeElement.blur();
        }

        function completeTask(id) {
            db.ref(`tasks/${id}`).update({ status: 'waiting' });
        }

        function approveTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            db.ref(`tasks/${id}`).update({ status: 'done' });

            db.ref('balance').transaction((currentBalance) => {
                return (currentBalance || 0.00) + task.reward;
            });
        }

        function deleteTask(id) {
            db.ref(`tasks/${id}`).remove();
        }

        function openResetModal() {
            document.getElementById('resetModal').classList.add('active');
        }

        function closeResetModal() {
            document.getElementById('resetModal').classList.remove('active');
        }

        function confirmResetBalance() {
            db.ref('balance').transaction(() => {
                return 0.00;
            });
            closeResetModal();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            const activeTasks = tasks.filter(task => task.status !== 'done');

            if (activeTasks.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:1.1rem; padding: 24px 0;">Alles erledigt! Keine Aufgaben offen.</p>';
                return;
            }

            activeTasks.sort((a, b) => {
                if (a.status === b.status) return b.id - a.id;
                return a.status === 'waiting' ? -1 : 1;
            });

            activeTasks.forEach(task => {
                const item = document.createElement('div');
                const isWaiting = task.status === 'waiting';
                item.className = `task-card ${isWaiting ? 'waiting' : ''}`;

                let actionButton = '';

                if (currentRole === 'child') {
                    if (task.status === 'open') {
                        actionButton = `<button class="btn-complete" onclick="completeTask('${task.id}')">Erledigt</button>`;
                    } else if (isWaiting) {
                        actionButton = `<span style="font-size: 1.05rem; color: #b45309; font-weight: 700;">Wird geprüft...</span>`;
                    }
                } else if (currentRole === 'parent') {
                    if (isWaiting) {
                        actionButton = `
                            <div class="parent-btn-group">
                                <button class="btn-check" onclick="approveTask('${task.id}')">✔</button>
                                <button class="btn-trash" onclick="deleteTask('${task.id}')">🗑</button>
                            </div>`;
                    } else {
                        actionButton = `<button class="btn-trash" onclick="deleteTask('${task.id}')">🗑</button>`;
                    }
                }

                item.innerHTML = `
                    <div style="flex: 1; min-width: 0;">
                        <div class="task-title" style="${isWaiting ? 'text-decoration: line-through; color: var(--text-muted);' : ''}">${task.title}</div>
                        <div class="task-reward">+ ${task.reward.toFixed(2).replace('.', ',')} €</div>
                    </div>
                    <div class="task-action">
                        ${actionButton}
                    </div>
                `;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
